{% extends "base.html" %}

{% block title %}Kasir (POS) - Toko Jago Damri{% endblock %}

{% block content %}
<div class="h-[calc(100vh-8rem)] flex flex-col lg:flex-row gap-6 -m-4 sm:-m-6 lg:-m-8 p-4 sm:p-6 lg:p-8" x-data="posSystem()">
    <!-- Bagian Kiri: Area Produk -->
    <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <!-- Pencarian & Filter -->
        <div class="p-4 border-b border-gray-200 flex flex-col sm:flex-row gap-4">
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search" class="h-5 w-5 text-gray-400"></i>
                </div>
                <input type="text" x-model="searchQuery" class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm" placeholder="Scan barcode atau cari nama barang..." autofocus>
            </div>
            <div class="flex gap-2">
                <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors">Semua</button>
                <button class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Sembako</button>
            </div>
        </div>

        <!-- Daftar Produk -->
        <div class="flex-1 p-4 overflow-y-auto bg-gray-50">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <template x-for="product in filteredProducts" :key="product.id">
                    <div @click="addToCart(product)" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm hover:shadow-md hover:border-primary-300 cursor-pointer transition-all active:scale-95 flex flex-col h-full">
                        <div class="text-xs text-gray-500 mb-1" x-text="product.sku"></div>
                        <h3 class="font-bold text-gray-900 text-sm leading-tight flex-1" x-text="product.name"></h3>
                        <div class="mt-3 flex justify-between items-end">
                            <span class="font-bold text-primary-600" x-text="formatCurrency(product.price)"></span>
                            <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">Stok: <span x-text="product.stock"></span></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Bagian Kanan: Struk / Keranjang Belanja -->
    <div class="w-full lg:w-96 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden shrink-0">
        <!-- Header Cart -->
        <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
            <h2 class="font-bold text-gray-900 flex items-center">
                <i data-lucide="shopping-cart" class="w-5 h-5 mr-2 text-primary-500"></i>
                Keranjang
            </h2>
            <button @click="clearCart" class="text-sm text-red-500 hover:text-red-700 font-medium flex items-center" x-show="cart.length > 0">
                <i data-lucide="trash-2" class="w-4 h-4 mr-1"></i> Kosongkan
            </button>
        </div>

        <!-- Daftar Item Cart -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <div x-show="cart.length === 0" class="h-full flex flex-col items-center justify-center text-gray-400">
                <i data-lucide="shopping-cart" class="w-12 h-12 mb-2 opacity-20"></i>
                <p>Belum ada barang</p>
            </div>

            <template x-for="(item, index) in cart" :key="index">
                <div class="flex items-center justify-between border-b border-gray-100 pb-3 last:border-0">
                    <div class="flex-1 pr-2">
                        <h4 class="text-sm font-bold text-gray-900 line-clamp-1" x-text="item.name"></h4>
                        <div class="text-xs text-primary-600 font-medium mt-0.5" x-text="formatCurrency(item.price)"></div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden h-8">
                            <button @click="decreaseQty(index)" class="px-2 bg-gray-50 text-gray-600 hover:bg-gray-200 hover:text-gray-900 transition-colors">
                                <i data-lucide="minus" class="w-3 h-3"></i>
                            </button>
                            <span class="w-8 text-center text-sm font-medium" x-text="item.qty"></span>
                            <button @click="increaseQty(index)" class="px-2 bg-gray-50 text-gray-600 hover:bg-gray-200 hover:text-gray-900 transition-colors">
                                <i data-lucide="plus" class="w-3 h-3"></i>
                            </button>
                        </div>
                        <div class="text-sm font-bold text-gray-900 text-right w-20" x-text="formatCurrency(item.price * item.qty)"></div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Summary & Checkout -->
        <div class="p-4 border-t border-gray-200 bg-gray-50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm text-gray-500">Subtotal</span>
                <span class="font-medium text-gray-900" x-text="formatCurrency(subtotal)"></span>
            </div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-base font-bold text-gray-900">Total</span>
                <span class="text-xl font-bold text-primary-600" x-text="formatCurrency(total)"></span>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-500 mb-1">Jumlah Bayar</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="text-gray-500 font-medium">Rp</span>
                    </div>
                    <input type="number" x-model="payment" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-lg font-bold text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500" placeholder="0">
                </div>
                
                <!-- Quick Payment Buttons -->
                <div class="grid grid-cols-3 gap-2 mt-2">
                    <button @click="payment = total" class="py-1 px-2 text-xs font-medium bg-gray-200 rounded text-gray-700 hover:bg-gray-300">Uang Pas</button>
                    <button @click="addPayment(50000)" class="py-1 px-2 text-xs font-medium bg-gray-200 rounded text-gray-700 hover:bg-gray-300">50K</button>
                    <button @click="addPayment(100000)" class="py-1 px-2 text-xs font-medium bg-gray-200 rounded text-gray-700 hover:bg-gray-300">100K</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 pt-3 border-t border-gray-200" x-show="payment > 0">
                <span class="text-sm font-medium text-gray-700">Kembalian</span>
                <span class="text-lg font-bold" :class="change >= 0 ? 'text-green-600' : 'text-red-500'" x-text="formatCurrency(change)"></span>
            </div>

            <button class="w-full py-3 bg-primary-500 hover:bg-primary-600 text-white font-bold rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" :disabled="cart.length === 0 || change < 0" @click="processTransaction">
                <i data-lucide="printer" class="w-5 h-5"></i>
                Bayar & Cetak Struk
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('posSystem', () => ({
            searchQuery: '',
            cart: [],
            payment: '',
            products: [],

            init() {
                fetch('/api/barang')
                    .then(response => response.json())
                    .then(data => {
                        this.products = data;
                    })
                    .catch(err => console.error("Error fetching barang:", err));
            },

            get filteredProducts() {
                if (this.searchQuery === '') {
                    return this.products;
                }
                const lowerCaseQuery = this.searchQuery.toLowerCase();
                return this.products.filter(p => 
                    p.name.toLowerCase().includes(lowerCaseQuery) || 
                    p.sku.toLowerCase().includes(lowerCaseQuery)
                );
            },

            get subtotal() {
                return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            },

            get total() {
                return this.subtotal; // Jika ada pajak/diskon bisa ditambahkan di sini
            },

            get change() {
                const payAmount = parseFloat(this.payment) || 0;
                return payAmount - this.total;
            },

            addToCart(product) {
                const existingItem = this.cart.find(item => item.id === product.id);
                if (existingItem) {
                    existingItem.qty += 1;
                } else {
                    this.cart.push({
                        ...product,
                        qty: 1
                    });
                }
                // Reset search after add
                this.searchQuery = '';
            },

            increaseQty(index) {
                this.cart[index].qty += 1;
            },

            decreaseQty(index) {
                if (this.cart[index].qty > 1) {
                    this.cart[index].qty -= 1;
                } else {
                    this.cart.splice(index, 1);
                }
            },

            clearCart() {
                if (confirm('Kosongkan keranjang belanja?')) {
                    this.cart = [];
                    this.payment = '';
                }
            },

            addPayment(amount) {
                const current = parseFloat(this.payment) || 0;
                this.payment = current + amount;
            },

            processTransaction() {
                alert('Transaksi Berhasil!\n\nKembalian: ' + this.formatCurrency(this.change));
                this.cart = [];
                this.payment = '';
            },

            formatCurrency(value) {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(value);
            }
        }));
    });
</script>
{% endblock %}
